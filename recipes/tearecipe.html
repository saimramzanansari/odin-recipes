   <h1>Tea Recipe</h1>
   <img src="pics/tea.jpg" alt="Tea" style="width: 15em; height:15em;">
   <h4>Recipe to make a simple and delicious cup of tea</h4>
   <hr>

   <p>Ingredients:</p>
    <ul>
      <li>1 cup water</li>
      <li>1 tea bag</li>
      <li>1 tsp sugar (optional)</li>
    </ul>

   <p>Steps:</p>
    <ol>
      <li>Bring water to a boil.</li>
      <li>Remove from heat and add tea bag.</li>
      <li>Steep for 3-5 minutes.</li>
      <li>Remove tea bag and add sugar if desired.</li>
    </ol>
